name: Rust CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - ".github/renovate.json"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - ".github/renovate.json"

permissions:
  contents: read

jobs:
  rust:
    name: fmt, lint, test, feature lanes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install nextest
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # cargo-deny
        with:
          tool: cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # cargo-audit
        with:
          tool: cargo-audit

      - name: Format
        run: cargo fmt --check

      - name: Check all features
        run: cargo check --workspace --all-features

      - name: Check warnings as errors
        run: cargo check --workspace --all-features
        env:
          RUSTFLAGS: -Dwarnings

      - name: Check structure-only lane
        run: cargo check --workspace --no-default-features
        env:
          RUSTFLAGS: -Dwarnings

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Format vector audit tool
        run: cargo fmt --manifest-path tools/vector-audit/Cargo.toml --check

      - name: Clippy vector audit tool
        run: cargo clippy --manifest-path tools/vector-audit/Cargo.toml --all-targets -- -D warnings

      - name: Test native lane
        run: cargo nextest run --workspace --no-default-features --features native

      - name: Test all features
        run: cargo nextest run --workspace --all-features

      - name: Independent vector audit
        run: cargo run --manifest-path tools/vector-audit/Cargo.toml -- .

      - name: Doc build
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Doctests
        run: cargo test --workspace --all-features --doc

      - name: Check native lane
        run: cargo check --workspace --no-default-features --features native

      - name: Check wasm32 lane
        run: cargo check --workspace --no-default-features --features wasm --target wasm32-unknown-unknown

      - name: Dependency policy
        run: cargo deny check

      - name: Security advisory audit
        run: cargo audit
