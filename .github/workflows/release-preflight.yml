name: Release Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-crate:
    name: rust crate metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install nextest
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # nextest

      - name: Install cargo-deny
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # cargo-deny
        with:
          tool: cargo-deny

      - name: Check release readiness contract
        run: node scripts/check_release_readiness.mjs

      - name: Inspect crate tarball and dry-run publish
        run: node scripts/publish_crates_in_order.mjs inspect
